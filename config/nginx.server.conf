######################
#  server ipromouter #
######################

# HTTP блок — редирект на HTTPS
server {
    listen 80;
    server_name btlplus.ru www.btlplus.ru xn----btb4abjbeix.xn--p1ai www.xn----btb4abjbeix.xn--p1ai;
    return 301 https://$server_name$request_uri;
}

# HTTPS основной блок (без www)
server {
    listen 443 ssl http2;
    server_name btlplus.ru xn----btb4abjbeix.xn--p1ai;

    root /home/alice/ipromouter/core;
    charset UTF-8;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/btlplus.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btlplus.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip сжатие
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Favicon
    location ~ ^/favicon\.(ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    # site.webmanifest
    location ~ ^/site.webmanifest {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Content-Type "application/manifest+json";
    }

    # Robots.txt и sitemap
    location ~ ^/(robots\.txt|sitemap\.xml)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Статические файлы (assets и static)
    location ~ ^/(assets|static)/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Медиа файлы
    location /media/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Изображения
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Основной proxy к приложению
    location / {
        proxy_pass http://127.0.0.1:8000;
       # proxy_set_header Host $server_name;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Обработка ошибок
    error_page 500 502 503 504 /500.html;
    location = /500.html {
        root /home/alice/ipromouter/core/app_site/templates;
    }

    # Безопасность — блокируем скрытые файлы
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    keepalive_timeout 65;
}

# HTTPS редирект www на основной домен
server {
    listen 443 ssl http2;
    server_name www.btlplus.ru www.xn----btb4abjbeix.xn--p1ai;

    ssl_certificate /etc/letsencrypt/live/btlplus.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btlplus.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://btlplus.ru$request_uri;
}