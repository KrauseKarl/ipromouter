{% load static %}

<style>
    .slider-root{width:100%;overflow:hidden;padding:0 0 1.5rem;}
    .slider-track-wrap{position:relative;overflow:hidden;}
    .slider-track{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform;}
    .slide{flex:0 0 var(--slide-w);padding:0 6px;box-sizing:border-box;transition:opacity .45s;}
    .slide.dim {cursor: pointer;}
    .slide-inner{border:none;border-radius:8px;overflow:hidden;height:24rem;display:flex;flex-direction:column;}
    .slide-img{width:100%;height:180px;object-fit:cover;background:var(--first-color);display:flex;align-items:center;justify-content:center;}
    .slide-body{padding:14px 16px;flex:1;}
    .slide-title{font-size:15px;font-weight:700;color:var(--color-text-primary);margin:0 0 8px;}
    .slide-list{list-style:none;margin:0;padding:10px;}
    .slide-list li{font-size:13px;color:var(--color-text-secondary);padding:2px 0;display:flex;gap:6px;align-items:baseline;}
    .slide-list li::before{content:"";display:inline-block;width:5px;height:5px;border-radius:50%;background:#f0a500;flex-shrink:0;margin-top:4px;}
    .dots{display:flex;justify-content:center;gap:6px;margin-top:1rem;margin-bottom:1rem;}
    .dot{position: relative;width:10px;height:10px;border-radius:50%;background:var(--first-color);cursor:pointer;transition:all .25s;}
    .dot.active{width:180px;height:20px;border-radius:8px;margin-top:-5px;}
    .dot.active::after {content:attr(data-title);position:absolute;left:50%;transform:translate(-50%,-50%);top:50%;white-space:nowrap;font-size:12px;font-weight:600;color:white;pointer-events: none;}
    .edge-fade-l,.edge-fade-r{position:absolute;top:0;bottom:0;width:12%;pointer-events:none;z-index:2;}
    .edge-fade-l{left:0;background:linear-gradient(to right,rgba(255,255,255,.2),transparent);}
    .edge-fade-r{right:0;background:linear-gradient(to left,rgba(255,255,255,.2),transparent);}
</style>

                        Основные направления BTL-кампаний
                    </h2>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="slider-root" id="sl">
                <div class="dots" id="dots"></div>
                <div class="slider-track-wrap" id="wrap">
                    <div class="slider-track" id="track"></div>
                    <div class="edge-fade-l"></div>
                    <div class="edge-fade-r"></div>
                </div>

            </div>
        </div>
    </div>

</section>

            ]

          // 7 — Подбор персонала
          {

            images: [
              { src: "{% static 'images/services/hr/hr_1_jpg-800x600.jpg' %}", srcset: "{% static 'images/services/hr/hr_1_webp-800x600.webp' %}", alt: "Подбор и работа с персоналом" },
              { src: "{% static 'images/services/hr/hr_2_jpg-800x600.jpg' %}", srcset: "{% static 'images/services/hr/hr_2_webp-800x600.webp' %}", alt: "Подбор и работа с персоналом" },
              { src: "{% static 'images/services/hr/hr_3_jpg-800x600.jpg' %}", srcset: "{% static 'images/services/hr/hr_3_webp-800x600.webp' %}", alt: "Подбор и работа с персоналом" },
              { src: "{% static 'images/services/hr/hr_4_jpg-800x600.jpg' %}", srcset: "{% static 'images/services/hr/hr_4_webp-800x600.webp' %}", alt: "Подбор и работа с персоналом" },
            ]

    const SLIDES=[
      {title:"Промо акции",items:["Листовки","Промо-модели, аниматоры","Сэмплинг и дегустация","Тайный покупатель","Мерчандайзинг","HoReCa"]},
      {title:"Полиграфия",items:["Печать листовок","Сувенирная продукция","Офсетная печать","POS-материалы","Трейд-маркетинг"]},
      {title:"Рекламные конструкции",items:["POS-материалы","Лайтбоксы","Брендирование","Мерчандайзинг на одежде и шарах"]},
      {title:"Медиафасады",items:["Размещение на медиафасадах","Размещение на видеоэкранах","В любом городе и стране"]},
      {title:"Консалтинг",items:["Маркетинговая стратегия","Реализация маркетинговых мероприятий","Комплекс рекламных услуг"]},
      {title:"Праздничное оформление",items:["Фотозоны","Световой декор","Воздушные шары","Гирлянды из шаров","Аренда аппарата сладкой ваты"]},
      {title:"Соц. исследования",items:["Опрос","Наблюдение","Контент анализ","Фокус группа"]},
      {title:"Подбор персонала",items:["Супервайзер","Тайный покупатель","Подборка кандидатов","Обучение персонала","Разработка корпоративных стандартов"]}
    ];

    // ─── Состояние ───────────────────────────────────────────
    const track   = document.getElementById("track");
    const dotsEl  = document.getElementById("dots");
    const wrap    = document.getElementById("wrap");
    const N       = SLIDES.length;
    let cur        = 3;   // индекс активного слайда (0..N-1)
    let visible    = 3;   // слайдов видно одновременно
    let slideW     = 0;   // ширина одного слайда в px
    let dragging   = false;
    let dragStartX = 0;
    let dragDelta  = 0;

    // ─── Медиа-хелпер ────────────────────────────────────────
    function buildMedia(idx) {
      const m = SLIDE_MEDIA[idx];
      if (!m || m.type === "none") {
        return `<div class="slide-img">[ нет фото ]</div>`;
      }
      if (m.type === "images") {
        const img = m.images[0];
        return `<div class="slide-img" style="padding:0;position:relative;">
          <img alt="${img.alt}" style="width:100%;height:100%;object-fit:cover;display:block;"
               srcset="${img.srcset}" src="${img.src}">
        </div>`;
      }
      if (m.type === "video") {
        const sources = m.sources.map(s =>
          `<source src="${s.src}" type="${s.type}"${s.media ? ` media="${s.media}"` : ""}>`
        ).join("");
        return `<div class="slide-img" style="padding:0;position:relative;overflow:hidden;">
          <img alt="poster" style="width:100%;height:100%;object-fit:cover;display:block;" src="${m.fallback}">
          <video autoplay muted playsinline poster="${m.poster}"
                 onended="this.currentTime=0;this.play();"
                 style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;">
            ${sources}
          </video>
        </div>`;
      }
    }

    // ─── Построить один DOM-элемент слайда ───────────────────
    function buildSlide(realIdx, isClone) {
      const s   = SLIDES[realIdx];
      const el  = document.createElement("div");
      el.className = "slide dim" + (isClone ? " clone" : "");
      el.dataset.real = realIdx;
      el.innerHTML = `
        <div class="slide-inner">
          ${buildMedia(realIdx)}
          <div class="slide-body">
            <p class="slide-title">${s.title}</p>
            <ul class="slide-list">${s.items.map(x => `<li>${x}</li>`).join("")}</ul>
          </div>
        </div>`;
      if (!isClone) {
        el.addEventListener("click", () => {
          if (realIdx !== cur) { cur = realIdx; update(); }
        });
      }
      return el;
    }

    // ─── Рендер: клоны_конца | настоящие | клоны_начала ──────
    function render() {
      track.innerHTML = "";
      dotsEl.innerHTML = "";

      // клоны последних `visible` слайдов — в начало трека
      for (let i = N - visible; i < N; i++) {
        track.appendChild(buildSlide(i, true));
      }

      // настоящие слайды
      SLIDES.forEach((_, i) => {
        track.appendChild(buildSlide(i, false));

        const d = document.createElement("div");
        d.className = "dot" + (i === cur ? " active" : "");
        d.dataset.title = SLIDES[i].title;
        d.addEventListener("click", () => { cur = i; update(); });
        dotsEl.appendChild(d);
      });

      // клоны первых `visible` слайдов — в конец трека
      for (let i = 0; i < visible; i++) {
        track.appendChild(buildSlide(i, true));
      }
    }

    // ─── Размеры ─────────────────────────────────────────────
    function getVisible() { return window.innerWidth < 576 ? 1 : 3; }

    function setSlideW() {
      visible = getVisible();
      slideW  = wrap.offsetWidth / visible - 20;
      track.querySelectorAll(".slide").forEach(s => {
        s.style.flex = `0 0 ${slideW}px`;
      });
    }

    // ─── Позиция трека для cur ────────────────────────────────
    // Трек: [visible клонов конца] [слайд0..N-1] [visible клонов начала]
    // Индекс в треке для cur: visible + cur
    // Центрируем активный слайд: сдвигаем ещё на (visible-1)/2 * slideW влево
    function getOffset() {
      const trackIdx = visible + cur;
      const center   = (visible - 1) / 2;
      return (trackIdx - center) * slideW;
    }

    // ─── Обновить позицию и стили ─────────────────────────────
    function update(animate = true) {
      setSlideW();

      if (!animate) {
        track.style.transition = "none";
      } else {
        track.style.transition = "transform .45s cubic-bezier(.4,0,.2,1)";
      }

      track.style.transform = `translateX(-${getOffset()}px)`;

      // dim / active для настоящих слайдов
      track.querySelectorAll(".slide:not(.clone)").forEach(s => {
        const isCur = parseInt(s.dataset.real) === cur;
        s.className = "slide" + (isCur ? "" : " dim") + (s.classList.contains("clone") ? " clone" : "");
      });

      // dots
      dotsEl.querySelectorAll(".dot").forEach((d, i) => {
        d.className = "dot" + (i === cur ? " active" : "");
      });
    }


   // ─── Навигация ────────────────────────────────────────────
    function next() {
      cur++;
      update();

      // если вышли за правый край — тихий прыжок на начало
      if (cur >= N) {
        track.addEventListener("transitionend", () => {
          cur = 0;
          update(false);
        }, { once: true });
      }
    }

    function prev() {
      cur--;
      update();

      // если вышли за левый край — тихий прыжок на конец
      if (cur < 0) {
        track.addEventListener("transitionend", () => {
          cur = N - 1;
          update(false);
        }, { once: true });
      }
    }

    // ─── Touch (свайп) ────────────────────────────────────────
    wrap.addEventListener("touchstart", e => { dragStartX = e.touches[0].clientX; dragDelta = 0; }, { passive: true });
    wrap.addEventListener("touchmove",  e => { dragDelta = e.touches[0].clientX - dragStartX; },    { passive: true });
    wrap.addEventListener("touchend",   () => { if (Math.abs(dragDelta) > 40) { dragDelta < 0 ? next() : prev(); } });

    // ─── Mouse drag ───────────────────────────────────────────
    wrap.addEventListener("mousedown", e => {
      dragging   = true;
      dragStartX = e.clientX;
      dragDelta  = 0;
      wrap.style.cursor = "grabbing";
    });
    window.addEventListener("mousemove", e => {
      if (!dragging) return;
      dragDelta = e.clientX - dragStartX;
    });
    window.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      wrap.style.cursor = "";
      if (Math.abs(dragDelta) > 40) { dragDelta < 0 ? next() : prev(); }
    });

    // ─── Колёсико мыши ───────────────────────────────────────
    wrap.addEventListener("wheel", e => {
      e.preventDefault();
      e.deltaX > 0 || e.deltaY > 0 ? next() : prev();
    }, { passive: false });

    // ─── Ресайз ───────────────────────────────────────────────
    window.addEventListener("resize", () => { render(); setSlideW(); update(false); });

    // ─── Инициализация ───────────────────────────────────────
    render();
    setSlideW();
    update(false);
</script>
